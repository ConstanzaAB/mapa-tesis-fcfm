name: Actualizacion Automatica de Tesis FCFM

on:
  schedule:
    # Corre automáticamente todos los lunes a las 08:00 AM UTC (Ajustable)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Te permite hacer clic en un botón en GitHub para actualizar manualmente cuando quieras

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download es_core_news_sm

    - name: 🧠 Ejecutar minería de datos y NLP
      run: python mi_script.py

    - name: 🚀 Publicar nueva versión en GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: . # Sube el archivo resultado_fcfm.html generado
        keep_files: true